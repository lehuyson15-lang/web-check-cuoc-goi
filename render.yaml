services:
  - type: web
    name: callmanager-app
    runtime: node
    plan: free
    buildCommand: "./build.sh"
    startCommand: "cd backend && npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: callmanager-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: callmanager-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: VITE_API_URL
        value: /api
      - key: PORT
        value: 10000
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX_LOGIN
        value: "5"

databases:
  - name: callmanager-db
    plan: free

redis:
  - name: callmanager-redis
    plan: free
    ipAllowList: [] # Only allow internal connections
